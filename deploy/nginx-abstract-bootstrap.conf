# Bootstrap (HTTP only) vhost used when the SSL cert does not exist yet.
# Serves the site on port 80 and answers the ACME http-01 challenge. The
# final HTTPS vhost (nginx-abstract.conf) replaces this once certbot has
# issued the cert.
server {
  # Specific IP form, matching the other vhosts on this VPS so the bind
  # succeeds alongside them (0.0.0.0:80 would conflict with their
  # 64.227.102.65:80 and silently drop).
  listen 64.227.102.65:80;
  server_name abstractart.guru www.abstractart.guru;

  root /var/www/abstract;
  index index.html;

  location /.well-known/acme-challenge/ {
    root /var/www/abstract;
    allow all;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
