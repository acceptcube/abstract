server {
  # Specific IP to match the other vhosts on this VPS.
  listen 64.227.102.65:80;
  server_name abstractart.guru www.abstractart.guru;

  location /.well-known/acme-challenge/ {
    root /var/www/abstract;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 64.227.102.65:443 ssl http2;
  server_name abstractart.guru www.abstractart.guru;

  ssl_certificate     /etc/letsencrypt/live/abstractart.guru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/abstractart.guru/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  root /var/www/abstract;
  index index.html;

  # Security headers applied to every response on this vhost.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "interest-cohort=()" always;

  # Long cache for static assets, short for json so updates land fast.
  location ~* \.(png|jpg|jpeg|webp|svg|woff2?)$ {
    add_header Cache-Control "public, max-age=604800";
    add_header Access-Control-Allow-Origin "*";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }
  location ~* \.json$ {
    add_header Cache-Control "public, max-age=30";
    add_header Access-Control-Allow-Origin "*";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }
  location / {
    try_files $uri $uri/ /index.html;
  }
}
